# ===================================================================
# CodeForge Auth Service — Application Configuration
# ===================================================================

spring:
  application:
    name: auth-service

  # ── JPA & Datasource ──
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # ── Redis (required — backs JWT blacklist for logout/token revocation) ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ── OAuth2 Client Registrations ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: email, profile
            redirect-uri: "{baseUrl}/auth/oauth2/callback/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/auth/oauth2/callback/github"
        provider:
          github:
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

# ── Server ──
server:
  port: ${SERVER_PORT:8081}
  # Trust X-Forwarded-* headers from the gateway so {baseUrl} in OAuth2
  # redirect-uris resolves to the gateway's address, not this service's port.
  forward-headers-strategy: framework

# ── Eureka ──
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false
    hostname: localhost
    instance-id: ${spring.application.name}:${random.uuid}

# ── JWT Config ──
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForDevelopmentPurposesOnlyMustBeAtLeast256Bits}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}      # 15 minutes
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# ── Logging ──
logging:
  level:
    com.codeforge.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
