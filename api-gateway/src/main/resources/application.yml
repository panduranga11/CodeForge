spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForDevelopmentPurposesOnlyMustBeAtLeast256Bits}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  public-paths:
    - /auth/register
    - /auth/login
    - /auth/refresh
    - /auth/oauth2/**
    - /contest/v1/problems
    - /contest/v1/contests
    - /contest/v1/contests/explore
    - /actuator/health

logging:
  level:
    com.codeforge.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
